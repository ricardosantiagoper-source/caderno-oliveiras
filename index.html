<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Caderno de Oliveiras</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#ffffff;--bg2:#f5f4f0;--bg3:#eceae3;
      --border:#e0ddd5;--border2:#d0cdc5;
      --text:#1a1a18;--text2:#5a5a55;--text3:#9a9a95;
      --radius:10px;--radius-sm:6px;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    body{font-family:var(--font);background:var(--bg2);color:var(--text);min-height:100vh;}
    .app{max-width:700px;margin:0 auto;padding:1rem;}

    /* Tabs */
    .tabs-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
    .tab{padding:7px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.15s;font-family:var(--font);}
    .tab.active{background:var(--text);color:#fff;border-color:var(--text);}
    .tab:hover:not(.active){background:var(--bg3);}
    .tab-add{padding:7px 11px;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:transparent;cursor:pointer;font-size:13px;color:var(--text3);font-family:var(--font);}
    .tab-add:hover{color:var(--text);border-color:var(--text2);background:var(--bg);}
    .section{display:none;}.section.active{display:block;}

    /* Cards */
    .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden;}
    .card-pad{padding:1rem 1.125rem;}
    .card-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);}
    .card-title{font-size:14px;font-weight:600;color:var(--text);}

    /* Fields */
    .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .field{display:flex;flex-direction:column;gap:4px;}
    .field label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;}
    .field input,.field textarea,.field select{font-size:13px;padding:7px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);color:var(--text);width:100%;font-family:var(--font);}
    .field input:focus,.field textarea:focus{outline:none;border-color:var(--text2);background:var(--bg);}
    .field textarea{resize:vertical;min-height:60px;}
    .full-width{grid-column:1/-1;}
    .name-edit{background:none;border:none;border-bottom:1px dashed var(--border2);font-size:15px;font-weight:600;color:var(--text);padding:0 0 2px;flex:1;font-family:var(--font);}
    .name-edit:focus{outline:none;border-bottom-color:var(--text2);}

    /* Badge */
    .badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
    .badge-green{background:#e8f5d8;color:#3a6b10;}
    .badge-amber{background:#fde8c8;color:#8a4f0a;}

    /* Summary */
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
    .metric{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
    .metric-label{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500;}
    .metric-value{font-size:22px;font-weight:600;color:var(--text);}
    .metric-sub{font-size:11px;color:var(--text3);margin-top:1px;}

    /* Parcela row */
    .parcela-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);}
    .parcela-row:last-child{border-bottom:none;}
    .parcela-num{width:30px;height:30px;border-radius:50%;background:#e8eef8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#2a5aa0;flex-shrink:0;}
    .parcela-info{flex:1;}
    .parcela-name-v{font-size:14px;font-weight:500;}
    .parcela-detail{font-size:12px;color:var(--text2);margin-top:2px;}
    .go-btn{font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);}
    .go-btn:hover{background:var(--bg3);}

    /* Category blocks */
    .cat-block{border-bottom:1px solid var(--border);}
    .cat-block:last-child{border-bottom:none;}
    .cat-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;user-select:none;}
    .cat-header:hover{background:var(--bg2);}
    .cat-left{display:flex;align-items:center;gap:9px;}
    .cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .cat-name{font-size:13px;font-weight:500;}
    .cat-count{font-size:12px;color:var(--text3);}
    .cat-right{display:flex;align-items:center;gap:10px;}
    .cat-total{font-size:13px;font-weight:500;color:var(--text2);}
    .cat-chevron{font-size:10px;color:var(--text3);transition:transform 0.2s;}
    .cat-chevron.open{transform:rotate(180deg);}
    .cat-body{display:none;border-top:1px solid var(--border);background:var(--bg2);}
    .cat-body.open{display:block;}
    .cat-body-inner{padding:12px 16px;}

    /* Entries */
    .entry{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;}
    .entry:last-of-type{margin-bottom:12px;}
    .entry-header{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;}
    .entry-date{font-size:11px;color:var(--text3);white-space:nowrap;margin-top:2px;flex-shrink:0;min-width:68px;font-weight:500;}
    .entry-content{flex:1;}
    .entry-proc{font-size:13px;line-height:1.6;white-space:pre-wrap;}
    .entry-fito{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;}
    .fito-tag{font-size:11px;padding:2px 7px;border-radius:10px;background:#faeae6;color:#9a3820;}
    .entry-cost{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;flex-shrink:0;}
    .entry-actions{display:flex;gap:6px;padding:0 12px 8px;justify-content:flex-end;}
    .act-btn{font-size:11px;padding:3px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font);}
    .act-btn:hover{background:var(--bg2);color:var(--text);}
    .act-btn.del:hover{border-color:#f0b8b8;color:#a02020;background:#fef0f0;}
    .add-entry-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);background:none;border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;width:100%;font-family:var(--font);}
    .add-entry-btn:hover{color:var(--text);border-color:var(--text2);background:var(--bg);}

    /* Photos */
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
    .photo-card{position:relative;border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:1;border:1px solid var(--border);cursor:pointer;}
    .photo-card img{width:100%;height:100%;object-fit:cover;display:block;}
    .photo-card-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.55));padding:5px 7px;}
    .photo-card-date{font-size:10px;color:#fff;}
    .photo-card-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.45);border:none;color:#fff;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
    .photo-card-del:hover{background:rgba(160,32,32,0.85);}
    .upload-zone{border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:18px;text-align:center;cursor:pointer;margin-bottom:12px;}
    .upload-zone:hover{background:var(--bg);border-color:var(--text2);}
    .upload-zone p{font-size:13px;color:var(--text3);margin-top:5px;}

    /* Timeline */
    .ov-filters{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);}
    .ov-filter{font-size:12px;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-family:var(--font);}
    .ov-filter.active{background:var(--text);color:#fff;border-color:var(--text);}
    .ov-timeline{padding:14px;}
    .ov-day{margin-bottom:18px;}
    .ov-day-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .ov-day-line{flex:1;height:1px;background:var(--border);}
    .ov-day-date{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;}
    .ov-item{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;}
    .ov-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
    .ov-item-body{flex:1;}
    .ov-item-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px;}
    .ov-parcela{font-size:11px;font-weight:600;color:var(--text2);}
    .ov-cat{font-size:11px;padding:1px 7px;border-radius:10px;font-weight:500;}
    .ov-proc{font-size:13px;line-height:1.5;}
    .ov-cost{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;flex-shrink:0;}
    .ov-empty{font-size:13px;color:var(--text3);text-align:center;padding:2rem 0;}
    .ov-thumb{width:46px;height:46px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0;cursor:pointer;border:1px solid var(--border);}

    /* Calendar */
    .cal-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:1rem;}
    .cal-month{background:var(--bg2);border-radius:var(--radius-sm);padding:8px 6px;}
    .cal-month-name{font-size:11px;font-weight:600;color:var(--text2);text-align:center;margin-bottom:5px;}
    .cal-tasks{display:flex;flex-direction:column;gap:3px;}
    .cal-task{font-size:10px;padding:2px 5px;border-radius:3px;line-height:1.4;}
    .t-fert{background:#e8f5d8;color:#3a6b10;}
    .t-rega{background:#daeaf8;color:#1a5a95;}
    .t-poda{background:#fde8c8;color:#8a4f0a;}
    .t-trat{background:#faeae6;color:#9a3820;}
    .t-col{background:#eceaff;color:#4a40b0;}
    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;}
    .leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
    .leg-dot{width:9px;height:9px;border-radius:2px;}

    /* Modals */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:100;padding:1rem;}
    .modal-bg.open{display:flex;}
    .modal{background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;width:420px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
    .modal h3{font-size:15px;font-weight:600;margin-bottom:3px;}
    .modal-sub{font-size:12px;color:var(--text3);margin-bottom:1rem;}
    .mfield{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
    .mfield label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;}
    .mfield input,.mfield textarea,.mfield select{font-size:13px;padding:7px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);color:var(--text);width:100%;font-family:var(--font);}
    .mfield textarea{resize:vertical;min-height:80px;}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
    .btn-cancel{font-size:13px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);}
    .btn-save{font-size:13px;padding:7px 16px;border-radius:var(--radius-sm);background:var(--text);color:#fff;border:none;cursor:pointer;font-weight:500;font-family:var(--font);}
    .btn-save:hover{opacity:.85;}
    .fito-section{display:none;border-top:1px solid var(--border);margin-top:6px;padding-top:10px;}
    .fito-section.show{display:block;}
    .foto-preview{width:100%;max-height:180px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:8px;display:none;}
    .del-parcela-btn{font-size:12px;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid #f0b8b8;background:transparent;color:#a02020;cursor:pointer;white-space:nowrap;font-family:var(--font);}
    .del-parcela-btn:hover{background:#fef0f0;}

    /* Lightbox */
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:90vw;max-height:75vh;object-fit:contain;border-radius:var(--radius);}
    .lightbox-info{color:#ccc;font-size:13px;text-align:center;max-width:400px;}
    .lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:50%;width:34px;height:34px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    /* Sync indicator */
    .sync-bar{position:fixed;bottom:0;left:0;right:0;background:var(--text);color:#fff;font-size:12px;padding:6px 16px;text-align:center;z-index:50;display:none;}
    .sync-bar.show{display:block;}

    /* Header */
    .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
    .app-title{font-size:18px;font-weight:700;color:var(--text);}
    .app-title span{color:var(--text3);font-weight:400;font-size:14px;margin-left:6px;}
    .sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:#aaa;}
    .sync-dot.ok{background:#4a9e4a;}
    .sync-dot.syncing{background:#e0a020;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

    /* Colheita */
    .colheita-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;}
    .colheita-card:last-of-type{margin-bottom:12px;}
    .colheita-header{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;}
    .colheita-year{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;flex-shrink:0;min-width:40px;}
    .colheita-body{flex:1;}
    .colheita-stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;}
    .colheita-stat{display:flex;flex-direction:column;gap:1px;}
    .colheita-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;}
    .colheita-stat-val{font-size:13px;font-weight:600;color:var(--text);}
    .colheita-rend{font-size:11px;padding:2px 8px;border-radius:10px;background:#eceaff;color:#4a40b0;font-weight:500;align-self:flex-start;margin-top:2px;}
    .colheita-lagar{font-size:12px;color:var(--text2);margin-top:3px;}
    .colheita-notas{font-size:12px;color:var(--text3);margin-top:3px;font-style:italic;}
    .colheita-cost{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;flex-shrink:0;}
    /* Histórico colheitas */
    .hist-header{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2);}
    .hist-col-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;}
    .hist-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);align-items:center;}
    .hist-row:last-child{border-bottom:none;}
    .hist-row:hover{background:var(--bg2);}
    .hist-val{font-size:13px;color:var(--text);}
    .hist-val.bold{font-weight:600;}
    .hist-rend{font-size:11px;padding:2px 7px;border-radius:10px;background:#eceaff;color:#4a40b0;font-weight:500;display:inline-block;}
    .totais-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px;border-top:1px solid var(--border);background:var(--bg2);}
    .totais-item{display:flex;flex-direction:column;gap:2px;}
    .totais-label{font-size:11px;color:var(--text3);}
    .totais-val{font-size:16px;font-weight:700;color:var(--text);}

    /* Relatórios */
    .rel-year-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
    .rel-year-btn{padding:5px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;color:var(--text2);font-family:var(--font);}
    .rel-year-btn.active{background:var(--text);color:#fff;border-color:var(--text);}
    .bar-chart{padding:16px 16px 8px;}
    .bar-chart-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .bar-label{font-size:12px;color:var(--text2);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bar-track{flex:1;background:var(--bg2);border-radius:4px;height:22px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;}
    .bar-fill-val{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
    .bar-val-outside{font-size:12px;font-weight:600;color:var(--text2);width:60px;text-align:right;flex-shrink:0;}
    .rel-table{width:100%;border-collapse:collapse;font-size:13px;}
    .rel-table th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);padding:8px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px;background:var(--bg2);}
    .rel-table td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text);}
    .rel-table tr:last-child td{border-bottom:none;}
    .rel-table tr:hover td{background:var(--bg2);}
    .rel-table .total-row td{font-weight:700;background:var(--bg2);border-top:2px solid var(--border2);}
    .rel-cat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}

  /* Alertas */
  .alertas-banner{background:#fffbe6;border:1px solid #f0d060;border-radius:var(--radius);padding:12px 16px;margin-bottom:1.25rem;display:none;}
  .alertas-banner.show{display:block;}
  .alertas-banner-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .alertas-banner-title{font-size:13px;font-weight:600;color:#7a5a00;}
  .alertas-banner-close{background:none;border:none;cursor:pointer;font-size:16px;color:#b08020;line-height:1;padding:0;}
  .alerta-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .alerta-item:last-child{margin-bottom:0;}
  .alerta-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
  .alerta-text{font-size:13px;color:#5a4000;line-height:1.4;}
  .alerta-cat{font-size:11px;padding:1px 6px;border-radius:8px;font-weight:500;margin-left:4px;}

  /* Mapa */
  .mapa-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:1rem;}
  #mapaLeaflet{height:380px;width:100%;}
  .mapa-parcela-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;}
  .mapa-parcela-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);}
  .mapa-parcela-cor{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,0.15);}
  .mapa-parcela-nome{flex:1;font-size:13px;font-weight:500;}
  .mapa-parcela-coords{font-size:11px;color:var(--text3);}
  .mapa-btn{font-size:12px;padding:4px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);white-space:nowrap;}
  .mapa-btn:hover{background:var(--bg2);}
  .mapa-btn.danger:hover{border-color:#f0b8b8;color:#a02020;background:#fef0f0;}
  .mapa-instrucao{font-size:12px;color:var(--text3);padding:10px 0;text-align:center;font-style:italic;}


      .summary-grid{grid-template-columns:repeat(2,1fr);}
      .cal-grid{grid-template-columns:repeat(3,1fr);}
      .field-grid{grid-template-columns:1fr;}
      .full-width{grid-column:1;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-title">🫒 Oliveiras <span>caderno de campo</span></div>
    <div class="sync-status" id="syncStatus">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">A ligar...</span>
    </div>
  </div>
  <div class="alertas-banner" id="alertasBanner">
    <div class="alertas-banner-header">
      <span class="alertas-banner-title">🔔 Tarefas recomendadas este mês</span>
      <button class="alertas-banner-close" onclick="fecharAlertas()">×</button>
    </div>
    <div id="alertasLista"></div>
  </div>
  <div class="tabs-wrap" id="mainTabs"></div>
  <div id="sections"></div>
</div>

<!-- Modal operação -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="mTitle">Nova entrada</h3>
    <div class="modal-sub" id="mSub"></div>
    <div class="mfield"><label>Data</label><input type="date" id="mData"></div>
    <div class="mfield"><label>Procedimento / descrição</label><textarea id="mProc" placeholder="Descreve o que foi feito..."></textarea></div>
    <div class="mfield"><label>Custo (€) — opcional</label><input type="number" id="mCusto" placeholder="0.00" min="0" step="0.01"></div>
    <div class="fito-section" id="fitoSection">
      <div class="mfield"><label>Marca comercial</label><input type="text" id="mMarca"></div>
      <div class="mfield"><label>Substância ativa</label><input type="text" id="mSubst"></div>
      <div class="mfield"><label>Dose / quantidade</label><input type="text" id="mQtd"></div>
      <div class="mfield"><label>Praga / alvo</label><input type="text" id="mAlvo"></div>
    </div>
    <div class="mfield"><label>Notas — opcional</label><input type="text" id="mNotas"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal foto -->
<div class="modal-bg" id="fotoModalBg">
  <div class="modal">
    <h3>Nova fotografia</h3>
    <div class="modal-sub" id="fotoModalSub"></div>
    <img id="fotoPreview" class="foto-preview">
    <div class="upload-zone" onclick="document.getElementById('fotoFileInput').click()">
      <div style="font-size:26px;">📷</div>
      <p>Clica para escolher uma foto ou tirar uma</p>
    </div>
    <input type="file" id="fotoFileInput" accept="image/*" capture="environment" style="display:none" onchange="onFotoSelected(event)">
    <div class="mfield"><label>Data</label><input type="date" id="fotoData"></div>
    <div class="mfield"><label>Nota / descrição</label><textarea id="fotoNota" placeholder="ex: Estado após poda, início de floração..." style="min-height:60px;"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeFotoModal()">Cancelar</button>
      <button class="btn-save" onclick="saveFoto()">Guardar foto</button>
    </div>
  </div>
</div>

<!-- Modal nova parcela -->
<div class="modal-bg" id="npModalBg">
  <div class="modal" style="width:360px;">
    <h3>Nova parcela</h3>
    <div class="modal-sub">Podes editar todos os detalhes depois.</div>
    <div class="mfield"><label>Nome da parcela</label><input type="text" id="npNome" placeholder="ex: Quinta do Vale, Parcela Norte..."></div>
    <div class="mfield"><label>Área (ha) — opcional</label><input type="number" id="npArea" placeholder="0.00" step="0.01" min="0"></div>
    <div class="mfield"><label>Estado inicial</label>
      <select id="npEstado">
        <option value="ativa">Com oliveiras (ativa)</option>
        <option value="porPlantar">Por plantar</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNpModal()">Cancelar</button>
      <button class="btn-save" onclick="criarParcela()">Criar parcela</button>
    </div>
  </div>
</div>

<!-- Modal colheita -->
<div class="modal-bg" id="colheitaModalBg">
  <div class="modal">
    <h3 id="cTitle">Registar colheita</h3>
    <div class="modal-sub" id="cSub"></div>
    <div class="mfield"><label>Data de colheita</label><input type="date" id="cData"></div>
    <div class="mfield"><label>Quantidade de azeitona (kg)</label><input type="number" id="cKg" placeholder="ex: 1200" min="0" step="0.1"></div>
    <div class="mfield"><label>Litros de azeite produzidos</label><input type="number" id="cLitros" placeholder="ex: 180" min="0" step="0.1"></div>
    <div class="mfield"><label>Lagar</label><input type="text" id="cLagar" placeholder="ex: Lagar da Cooperativa de Avis"></div>
    <div class="mfield"><label>Custo da colheita (€) — opcional</label><input type="number" id="cCusto" placeholder="0.00" min="0" step="0.01"></div>
    <div class="mfield"><label>Notas — opcional</label><textarea id="cNotas" placeholder="Condições, qualidade do azeite, observações..." style="min-height:60px;"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeColheitaModal()">Cancelar</button>
      <button class="btn-save" onclick="saveColheita()">Guardar colheita</button>
    </div>
  </div>
</div>

<!-- Modal exportar PDF -->
<div class="modal-bg" id="exportModalBg">
  <div class="modal" style="width:440px;">
    <h3>Exportar PDF</h3>
    <div class="modal-sub">Escolhe o que queres incluir no documento.</div>
    <div class="mfield">
      <label>Parcelas a incluir</label>
      <div id="exportParcelasCheck" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;"></div>
    </div>
    <div class="mfield">
      <label>Conteúdo</label>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:normal;text-transform:none;letter-spacing:0;cursor:pointer;"><input type="checkbox" id="expInfo" checked> Informação geral da parcela</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:normal;text-transform:none;letter-spacing:0;cursor:pointer;"><input type="checkbox" id="expOps" checked> Registos de operações</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:normal;text-transform:none;letter-spacing:0;cursor:pointer;"><input type="checkbox" id="expColheitas" checked> Colheitas e produção</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:normal;text-transform:none;letter-spacing:0;cursor:pointer;"><input type="checkbox" id="expCustos" checked> Resumo de custos</label>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:normal;text-transform:none;letter-spacing:0;cursor:pointer;"><input type="checkbox" id="expFotos" checked> Fotografias</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeExportModal()">Cancelar</button>
      <button class="btn-save" onclick="gerarPDF()">⬇ Gerar PDF</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lbImg" src="">
  <div class="lightbox-info" id="lbInfo"></div>
</div>

<div class="sync-bar" id="syncBar">A guardar...</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANCRL3RWd4Wa5X2JMPTsFCnKvZkJFqpaw",
  authDomain: "caderno-oliveiras.firebaseapp.com",
  projectId: "caderno-oliveiras",
  storageBucket: "caderno-oliveiras.firebasestorage.app",
  messagingSenderId: "309706449348",
  appId: "1:309706449348:web:e740f41ac177d843cf8491"
};

const fireApp = initializeApp(firebaseConfig);
const db = getFirestore(fireApp);
const STATE_DOC = "caderno/main";

// ── CONSTANTS ──────────────────────────────────────────────
const CATS=[
  {id:'custo',   label:'Custos',               dot:'#d94040',bg:'#faeaea',tc:'#922020'},
  {id:'solo',    label:'Manutenção do solo',    dot:'#5a9020',bg:'#e8f5d8',tc:'#3a6b10'},
  {id:'vedacao', label:'Manutenção da vedação', dot:'#b07010',bg:'#fde8c8',tc:'#8a4f0a'},
  {id:'adubacao',label:'Adubação',              dot:'#1a9870',bg:'#d8f5ea',tc:'#0e6e50'},
  {id:'rega',    label:'Rega',                  dot:'#2878cc',bg:'#daeaf8',tc:'#1a5a95'},
  {id:'fito',    label:'Fitofármacos',           dot:'#c05030',bg:'#faeae6',tc:'#9a3820'},
  {id:'outro',   label:'Outro',                  dot:'#808078',bg:'#eeecea',tc:'#505048'},
];
const CAL=[
  {m:'Jan',tasks:[{c:'t-poda',t:'Poda de formação'},{c:'t-trat',t:'Caldo bordalês'}]},
  {m:'Fev',tasks:[{c:'t-poda',t:'Poda de produção'},{c:'t-fert',t:'Adubo fundo (P,K)'}]},
  {m:'Mar',tasks:[{c:'t-fert',t:'Azoto (ureia)'},{c:'t-trat',t:'Prevenção gafa'}]},
  {m:'Abr',tasks:[{c:'t-fert',t:'Foliar (micronutr.)'},{c:'t-trat',t:'Monitoriz. mosca'}]},
  {m:'Mai',tasks:[{c:'t-rega',t:'Início rega'},{c:'t-trat',t:'Traça da oliveira'}]},
  {m:'Jun',tasks:[{c:'t-rega',t:'Rega regular'},{c:'t-fert',t:'Azoto cobertura'}]},
  {m:'Jul',tasks:[{c:'t-rega',t:'Rega intensa'},{c:'t-trat',t:'Mosca oliveira'}]},
  {m:'Ago',tasks:[{c:'t-rega',t:'Manter rega'},{c:'t-trat',t:'Controlo mosca'}]},
  {m:'Set',tasks:[{c:'t-col',t:'Colheita verde'},{c:'t-rega',t:'Reduzir rega'}]},
  {m:'Out',tasks:[{c:'t-col',t:'Colheita mista'},{c:'t-trat',t:'Pós-colheita'}]},
  {m:'Nov',tasks:[{c:'t-col',t:'Colheita preta'},{c:'t-fert',t:'Fósforo e potássio'}]},
  {m:'Dez',tasks:[{c:'t-poda',t:'Preparar poda'},{c:'t-fert',t:'Estrume orgânico'}]},
];

// ── STATE ───────────────────────────────────────────────────
function newParcela(n){
  const en={};CATS.forEach(c=>{en[c.id]=[];});
  return {id:uid(),n,nome:'Parcela '+n,area:'',arvores:'',variedade:'',plantacao:'',notas:'',entries:en,fotos:[],colheitas:[],porPlantar:false};
}
function defState(){
  return {parcelas:[
    {...newParcela(1),nome:'Parcela 1'},
    {...newParcela(2),nome:'Parcela 2'},
    {...newParcela(3),nome:'Parcela 3'},
    {...newParcela(4),nome:'Parcela 4'},
    {...newParcela(5),nome:'Parcela 5',porPlantar:true},
  ]};
}

let state=defState();
let curP=null,curCat=null,editId=null,openCats={},ovParFilter='all',ovCatFilter='all',fotoB64=null,curFotoP=null,activeTab='visao';
let isSyncing=false,pendingSave=false;

// ── FIREBASE SYNC ───────────────────────────────────────────
function setSyncStatus(s){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncText');
  if(s==='ok'){dot.className='sync-dot ok';txt.textContent='Sincronizado';}
  else if(s==='syncing'){dot.className='sync-dot syncing';txt.textContent='A sincronizar...';}
  else{dot.className='sync-dot';txt.textContent='Sem ligação';}
}

async function saveToFirebase(){
  if(isSyncing){pendingSave=true;return;}
  isSyncing=true;
  setSyncStatus('syncing');
  showSyncBar();
  try{
    await setDoc(doc(db,STATE_DOC),{data:JSON.stringify(state),ts:Date.now()});
    setSyncStatus('ok');
  }catch(e){
    console.error('Save error',e);
    setSyncStatus('offline');
  }
  isSyncing=false;
  hideSyncBar();
  if(pendingSave){pendingSave=false;saveToFirebase();}
}

function showSyncBar(){const b=document.getElementById('syncBar');b.classList.add('show');}
function hideSyncBar(){const b=document.getElementById('syncBar');b.classList.remove('show');}

// Listen for real-time changes from the other user
let isLocalUpdate=false;
onSnapshot(doc(db,STATE_DOC),(snap)=>{
  if(isLocalUpdate){isLocalUpdate=false;return;}
  if(snap.exists()){
    try{
      const remote=JSON.parse(snap.data().data);
      // merge: remote wins unless we're mid-edit
      state=remote;
      // ensure structure
      state.parcelas.forEach(p=>{
        if(!p.entries)p.entries={};
        if(!p.fotos)p.fotos=[];
        if(!p.colheitas)p.colheitas=[];
        CATS.forEach(c=>{if(!p.entries[c.id])p.entries[c.id]=[];});
      });
      rebuildTabs();
      refreshCurrentTab();
      setSyncStatus('ok');
    }catch(e){console.error('Parse error',e);}
  } else {
    // First time — save default state
    saveToFirebase();
  }
  setSyncStatus('ok');
},(err)=>{
  console.error('Snapshot error',err);
  setSyncStatus('offline');
});

function save(){
  isLocalUpdate=true;
  saveToFirebase();
}

// ── HELPERS ─────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function catById(id){return CATS.find(c=>c.id===id)||CATS[CATS.length-1];}

function formatDate(d){
  if(!d||d==='sem data')return d;
  try{const[y,m,day]=d.split('-');const ms=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return `${parseInt(day)} ${ms[parseInt(m)-1]} ${y}`;}catch(e){return d;}
}

// ── TABS & ROUTING ──────────────────────────────────────────
function rebuildTabs(){
  const tabsEl=document.getElementById('mainTabs');
  const secsEl=document.getElementById('sections');
  let th=`<button class="tab ${activeTab==='visao'?'active':''}" onclick="showTab('visao',this)">Visão geral</button>`;
  state.parcelas.forEach((p,i)=>{
    const nm=p.nome.length>9?p.nome.substring(0,8)+'…':p.nome;
    th+=`<button class="tab ${activeTab==='p'+i?'active':''}" onclick="showTab('p${i}',this)">${nm}</button>`;
  });
  th+=`<button class="tab ${activeTab==='ov'?'active':''}" onclick="showTab('ov',this)">Timeline</button>`;
  th+=`<button class="tab ${activeTab==='colheitas'?'active':''}" onclick="showTab('colheitas',this)">🫒 Colheitas</button>`;
  th+=`<button class="tab ${activeTab==='relatorios'?'active':''}" onclick="showTab('relatorios',this)">📊 Relatórios</button>`;
  th+=`<button class="tab ${activeTab==='mapa'?'active':''}" onclick="showTab('mapa',this)">🗺 Mapa</button>`;
  th+=`<button class="tab ${activeTab==='cal'?'active':''}" onclick="showTab('cal',this)">Calendário</button>`;
  th+=`<button class="tab" onclick="openExportModal()" style="background:#e8f5d8;color:#3a6b10;border-color:#c0d8a0;">⬇ Exportar</button>`;
  th+=`<button class="tab-add" onclick="openNpModal()" title="Adicionar nova parcela">+ Parcela</button>`;
  tabsEl.innerHTML=th;

  let sh=`<div class="section ${activeTab==='visao'?'active':''}" id="sec-visao"></div>`;
  state.parcelas.forEach((_,i)=>{sh+=`<div class="section ${activeTab==='p'+i?'active':''}" id="sec-p${i}"></div>`;});
  sh+=`<div class="section ${activeTab==='ov'?'active':''}" id="sec-ov"></div>`;
  sh+=`<div class="section ${activeTab==='colheitas'?'active':''}" id="sec-colheitas"></div>`;
  sh+=`<div class="section ${activeTab==='relatorios'?'active':''}" id="sec-relatorios"></div>`;
  sh+=`<div class="section ${activeTab==='mapa'?'active':''}" id="sec-mapa"></div>`;
  sh+=`<div class="section ${activeTab==='cal'?'active':''}" id="sec-cal"></div>`;
  secsEl.innerHTML=sh;
}

function refreshCurrentTab(){
  if(activeTab==='visao')renderVisao();
  else if(activeTab==='ov')renderOverview();
  else if(activeTab==='colheitas')renderColheitas();
  else if(activeTab==='relatorios')renderRelatorios();
  else if(activeTab==='mapa')renderMapa();
  else if(activeTab==='cal')renderCal();
  else{const idx=parseInt(activeTab.replace('p',''));if(!isNaN(idx))renderParcela(idx);}
}

window.showTab=function(id,btn){
  activeTab=id;
  rebuildTabs();
  refreshCurrentTab();
}

// ── VISÃO GERAL ─────────────────────────────────────────────
function renderVisao(){
  let totalArv=0,totalArea=0,totalCusto=0,totalAtivas=0;
  let rows='';
  state.parcelas.forEach((p,i)=>{
    const arv=parseInt(p.arvores)||0;
    const area=parseFloat(p.area)||0;
    let pc=0;
    CATS.forEach(c=>{(p.entries[c.id]||[]).forEach(e=>{pc+=parseFloat(e.custo)||0;});});
    if(!p.porPlantar){totalArv+=arv;totalArea+=area;totalCusto+=pc;totalAtivas++;}
    const nf=(p.fotos||[]).length;
    const badge=p.porPlantar?'<span class="badge badge-amber">Por plantar</span>':`<span class="badge badge-green">${arv} árvores</span>`;
    rows+=`<div class="parcela-row">
      <div class="parcela-num">${i+1}</div>
      <div class="parcela-info">
        <div class="parcela-name-v">${p.nome}</div>
        <div class="parcela-detail">${p.variedade||'Variedade não definida'}${area?' · '+area.toFixed(2)+' ha':''}${pc?' · '+pc.toFixed(2)+'€':''}${nf?' · '+nf+' foto'+(nf!==1?'s':''):''}</div>
      </div>
      ${badge}
      <button class="go-btn" onclick="showTab('p${i}',null)">Abrir</button>
    </div>`;
  });
  document.getElementById('sec-visao').innerHTML=`
    <div class="summary-grid">
      <div class="metric"><div class="metric-label">Árvores</div><div class="metric-value">${totalArv||'—'}</div><div class="metric-sub">nas ativas</div></div>
      <div class="metric"><div class="metric-label">Área total</div><div class="metric-value">${totalArea?totalArea.toFixed(2):'—'}</div><div class="metric-sub">hectares</div></div>
      <div class="metric"><div class="metric-label">Parcelas ativas</div><div class="metric-value">${totalAtivas}</div><div class="metric-sub">de ${state.parcelas.length}</div></div>
      <div class="metric"><div class="metric-label">Custos totais</div><div class="metric-value">${totalCusto?totalCusto.toFixed(0)+'€':'—'}</div><div class="metric-sub">todas as parcelas</div></div>
    </div>
    <div class="card"><div class="card-header"><span class="card-title">Parcelas</span></div>${rows}</div>`;
}

// ── PARCELA ─────────────────────────────────────────────────
function renderParcela(idx){
  const p=state.parcelas[idx];if(!p)return;
  const fotos=p.fotos||[];
  const fotoGrid=fotos.length===0?'':
    `<div class="photo-grid">${[...fotos].reverse().map(f=>`
      <div class="photo-card" onclick="openLightbox('${f._id}',${idx})">
        <img src="${f.data}" alt="foto">
        <div class="photo-card-overlay"><div class="photo-card-date">${formatDate(f.data_reg)||''}</div></div>
        <button class="photo-card-del" onclick="event.stopPropagation();delFoto(${idx},'${f._id}')">×</button>
      </div>`).join('')}</div>`;

  const fotoCat=`<div class="cat-block">
    <div class="cat-header" onclick="toggleCat('${p.id}_fotos')">
      <div class="cat-left"><div class="cat-dot" style="background:#5040b0"></div><span class="cat-name">Registo fotográfico</span><span class="cat-count">${fotos.length} foto${fotos.length!==1?'s':''}</span></div>
      <div class="cat-right"><span class="cat-chevron ${openCats[p.id+'_fotos']?'open':''}">▼</span></div>
    </div>
    <div class="cat-body ${openCats[p.id+'_fotos']?'open':''}">
      <div class="cat-body-inner">${fotoGrid}<button class="add-entry-btn" onclick="openFotoModal(${idx})">+ Adicionar fotografia</button></div>
    </div>
  </div>`;

  const catBlocks=CATS.map(c=>{
    const entries=p.entries[c.id]||[];
    const count=entries.length;
    const total=entries.reduce((s,e)=>s+(parseFloat(e.custo)||0),0);
    const isOpen=openCats[p.id+'_'+c.id];
    const entriesHtml=[...entries].reverse().map(e=>{
      const fitoTags=c.id==='fito'?`<div class="entry-fito">
        ${e.marca?`<span class="fito-tag">Marca: ${e.marca}</span>`:''}
        ${e.subst?`<span class="fito-tag">S.A.: ${e.subst}</span>`:''}
        ${e.qtd?`<span class="fito-tag">Dose: ${e.qtd}</span>`:''}
        ${e.alvo?`<span class="fito-tag">Alvo: ${e.alvo}</span>`:''}
      </div>`:'';
      return `<div class="entry">
        <div class="entry-header">
          <div class="entry-date">${e.data||'—'}</div>
          <div class="entry-content">
            <div class="entry-proc">${e.proc||'—'}</div>
            ${fitoTags}
            ${e.notas?`<div style="font-size:12px;color:var(--text3);margin-top:4px;">${e.notas}</div>`:''}
          </div>
          ${e.custo?`<div class="entry-cost">${parseFloat(e.custo).toFixed(2)}€</div>`:''}
        </div>
        <div class="entry-actions">
          <button class="act-btn" onclick="openModal(${idx},'${c.id}','${e._id}')">Editar</button>
          <button class="act-btn del" onclick="delEntry(${idx},'${c.id}','${e._id}')">Eliminar</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="cat-block">
      <div class="cat-header" onclick="toggleCat('${p.id}_${c.id}')">
        <div class="cat-left"><div class="cat-dot" style="background:${c.dot}"></div><span class="cat-name">${c.label}</span><span class="cat-count">${count} registo${count!==1?'s':''}</span></div>
        <div class="cat-right">${total>0?`<span class="cat-total">${total.toFixed(2)}€</span>`:''}<span class="cat-chevron ${isOpen?'open':''}">▼</span></div>
      </div>
      <div class="cat-body ${isOpen?'open':''}">
        <div class="cat-body-inner">${entriesHtml}<button class="add-entry-btn" onclick="openModal(${idx},'${c.id}',null)">+ Adicionar registo em ${c.label}</button></div>
      </div>
    </div>`;
  }).join('');

  const canDelete=state.parcelas.length>1;

window.onFotoSelected=function(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');const MAX=800;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      fotoB64=canvas.toDataURL('image/jpeg',0.75);
      const prev=document.getElementById('fotoPreview');prev.src=fotoB64;prev.style.display='block';
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}
window.saveFoto=function(){

  const f={_id:uid(),data:fotoB64,data_reg:document.getElementById('fotoData').value,nota:document.getElementById('fotoNota').value};

function renderOverview(){
  let all=[];
  state.parcelas.forEach((p,i)=>{
    CATS.forEach(c=>{(p.entries[c.id]||[]).forEach(e=>{all.push({...e,parcelaIdx:i,parcelaNome:p.nome,catId:c.id,tipo:'entry'});});});
    (p.fotos||[]).forEach(f=>{all.push({_id:f._id,data:f.data_reg,proc:f.nota||'Fotografia',parcelaIdx:i,parcelaNome:p.nome,catId:'_foto',tipo:'foto',imgData:f.data});});
  });
  let filtered=all;
  if(ovParFilter!=='all')filtered=filtered.filter(e=>e.parcelaIdx===parseInt(ovParFilter));
  if(ovCatFilter!=='all')filtered=filtered.filter(e=>e.catId===ovCatFilter);
  filtered.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const byDate={};
  filtered.forEach(e=>{const d=e.data||'sem data';if(!byDate[d])byDate[d]=[];byDate[d].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const totalVis=filtered.reduce((s,e)=>s+(parseFloat(e.custo)||0),0);

  const parFilters=`<div class="ov-filters">
    <button class="ov-filter ${ovParFilter==='all'?'active':''}" onclick="setOvPar('all')">Todas</button>
    ${state.parcelas.map((p,i)=>`<button class="ov-filter ${ovParFilter===String(i)?'active':''}" onclick="setOvPar('${i}')">${p.nome}</button>`).join('')}
  </div>`;
  const catFilters=`<div class="ov-filters" style="border-top:none;padding-top:0;">
    <button class="ov-filter ${ovCatFilter==='all'?'active':''}" onclick="setOvCat('all')">Todas as categorias</button>
    ${CATS.map(c=>`<button class="ov-filter ${ovCatFilter===c.id?'active':''}" onclick="setOvCat('${c.id}')">${c.label}</button>`).join('')}
    <button class="ov-filter ${ovCatFilter==='_foto'?'active':''}" onclick="setOvCat('_foto')">Fotos</button>
  </div>`;

  const timeline=dates.length===0?'<div class="ov-empty">Sem registos ainda.</div>':
    dates.map(d=>`<div class="ov-day">
      <div class="ov-day-header"><div class="ov-day-line"></div><div class="ov-day-date">${formatDate(d)||d}</div><div class="ov-day-line"></div></div>
      ${byDate[d].map(e=>{
        if(e.tipo==='foto')return `<div class="ov-item"><img src="${e.imgData}" class="ov-thumb" onclick="openLightbox('${e._id}',${e.parcelaIdx})"><div class="ov-item-body"><div class="ov-item-top"><span class="ov-parcela">${e.parcelaNome}</span><span class="ov-cat" style="background:#eceaff;color:#4a40b0">Fotografia</span></div><div class="ov-proc">${e.proc}</div></div></div>`;
        const cat=catById(e.catId);
        return `<div class="ov-item"><div class="ov-dot" style="background:${cat.dot}"></div><div class="ov-item-body"><div class="ov-item-top"><span class="ov-parcela">${e.parcelaNome}</span><span class="ov-cat" style="background:${cat.bg};color:${cat.tc}">${cat.label}</span></div><div class="ov-proc">${e.proc||'—'}</div>${e.notas?`<div style="font-size:12px;color:var(--text3);margin-top:2px;">${e.notas}</div>`:''}</div>${e.custo?`<div class="ov-cost">${parseFloat(e.custo).toFixed(2)}€</div>`:''}</div>`;
      }).join('')}
    </div>`).join('');

  document.getElementById('sec-ov').innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">Timeline de operações</span>${totalVis>0?`<span style="font-size:13px;font-weight:600;color:var(--text2);">${totalVis.toFixed(2)}€</span>`:''}</div>
      ${parFilters}${catFilters}
      <div class="ov-timeline">${timeline}</div>
    </div>`;
}

function renderColheitas(){
  // Agrupa todas as colheitas de todas as parcelas por ano
  let todasColheitas=[];
  state.parcelas.forEach((p,i)=>{
    (p.colheitas||[]).forEach(c=>{
      todasColheitas.push({...c, parcelaNome:p.nome, parcelaIdx:i});
    });
  });
  todasColheitas.sort((a,b)=>(b.data||'').localeCompare(a.data||''));

  // Totais globais
  const totalKg=todasColheitas.reduce((s,c)=>s+(parseFloat(c.kg)||0),0);
  const totalL=todasColheitas.reduce((s,c)=>s+(parseFloat(c.litros)||0),0);
  const totalCusto=todasColheitas.reduce((s,c)=>s+(parseFloat(c.custo)||0),0);
  const rendGlobal=totalKg&&totalL?(totalKg/totalL).toFixed(2):null;

  // Por parcela
  const porParcela=state.parcelas.map((p,i)=>{
    const cols=p.colheitas||[];
    const kg=cols.reduce((s,c)=>s+(parseFloat(c.kg)||0),0);
    const l=cols.reduce((s,c)=>s+(parseFloat(c.litros)||0),0);
    const custo=cols.reduce((s,c)=>s+(parseFloat(c.custo)||0),0);
    const rend=kg&&l?(kg/l).toFixed(2):null;
    return {p,i,cols,kg,l,custo,rend};
  }).filter(x=>x.cols.length>0);

  const emptyMsg='<div style="font-size:13px;color:var(--text3);text-align:center;padding:2rem 0;">Sem colheitas registadas ainda.<br>Adiciona a primeira colheita dentro de cada parcela.</div>';

  const historicoRows=todasColheitas.length===0?emptyMsg:
    `<div class="hist-header">
      <div class="hist-col-label">Parcela</div>
      <div class="hist-col-label">Data</div>
      <div class="hist-col-label">Azeitona</div>
      <div class="hist-col-label">Azeite</div>
      <div class="hist-col-label">Rendimento</div>
    </div>
    ${todasColheitas.map(c=>{
      const rend=(c.kg&&c.litros)?(parseFloat(c.kg)/parseFloat(c.litros)).toFixed(2):null;
      return `<div class="hist-row">
        <div class="hist-val bold">${c.parcelaNome}</div>
        <div class="hist-val">${formatDate(c.data)||'—'}</div>
        <div class="hist-val">${c.kg?parseFloat(c.kg).toFixed(0)+' kg':'—'}</div>
        <div class="hist-val">${c.litros?parseFloat(c.litros).toFixed(1)+' L':'—'}</div>
        <div class="hist-val">${rend?`<span class="hist-rend">${rend} kg/L</span>`:'—'}</div>
      </div>`;
    }).join('')}
    <div class="totais-grid">
      <div class="totais-item"><div class="totais-label">Total azeitona</div><div class="totais-val">${totalKg.toFixed(0)} kg</div></div>
      <div class="totais-item"><div class="totais-label">Total azeite</div><div class="totais-val">${totalL.toFixed(1)} L</div></div>
      <div class="totais-item"><div class="totais-label">Rendimento médio</div><div class="totais-val">${rendGlobal?rendGlobal+' kg/L':'—'}</div></div>
    </div>`;

  const porParcelaHtml=porParcela.length===0?'':porParcela.map(({p,i,cols,kg,l,custo,rend})=>`
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-header">
        <span class="card-title">${p.nome}</span>
        <button class="go-btn" onclick="openColheitaModal(${i},null)">+ Colheita</button>
      </div>
      ${cols.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(c=>{
        const r=(c.kg&&c.litros)?(parseFloat(c.kg)/parseFloat(c.litros)).toFixed(2):null;
        return `<div class="hist-row" style="grid-template-columns:1fr 1fr 1fr 1fr auto;">
          <div class="hist-val">${c.data?c.data.split('-')[0]:'—'}</div>
          <div class="hist-val">${c.kg?parseFloat(c.kg).toFixed(0)+' kg':'—'}</div>
          <div class="hist-val">${c.litros?parseFloat(c.litros).toFixed(1)+' L':'—'}</div>
          <div class="hist-val">${r?`<span class="hist-rend">${r} kg/L</span>`:'—'}</div>
          <div style="display:flex;gap:4px;">
            <button class="act-btn" onclick="openColheitaModal(${i},'${c._id}')">✏️</button>
            <button class="act-btn del" onclick="delColheita(${i},'${c._id}')">×</button>
          </div>
        </div>`;
      }).join('')}
      <div class="totais-grid" style="grid-template-columns:repeat(${custo?4:3},1fr);">
        <div class="totais-item"><div class="totais-label">Total azeitona</div><div class="totais-val">${kg.toFixed(0)} kg</div></div>
        <div class="totais-item"><div class="totais-label">Total azeite</div><div class="totais-val">${l.toFixed(1)} L</div></div>
        <div class="totais-item"><div class="totais-label">Rendimento médio</div><div class="totais-val">${rend?rend+' kg/L':'—'}</div></div>
        ${custo?`<div class="totais-item"><div class="totais-label">Custo total</div><div class="totais-val">${custo.toFixed(2)}€</div></div>`:''}
      </div>
    </div>`).join('');

  document.getElementById('sec-colheitas').innerHTML=`
    <div class="summary-grid" style="grid-template-columns:repeat(3,1fr);">
      <div class="metric"><div class="metric-label">Total azeitona</div><div class="metric-value">${totalKg?totalKg.toFixed(0):'—'}</div><div class="metric-sub">kg colhidos</div></div>
      <div class="metric"><div class="metric-label">Total azeite</div><div class="metric-value">${totalL?totalL.toFixed(1):'—'}</div><div class="metric-sub">litros produzidos</div></div>
      <div class="metric"><div class="metric-label">Rendimento médio</div><div class="metric-value">${rendGlobal||'—'}</div><div class="metric-sub">kg azeitona / litro</div></div>
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-header"><span class="card-title">Histórico completo</span></div>
      ${historicoRows}
    </div>
    ${porParcelaHtml}`;
}

// ── RELATÓRIOS ───────────────────────────────────────────────
let relAnoSel = null;

function renderRelatorios(){
  // Recolher todos os custos com ano
  let todosCustos=[];
  state.parcelas.forEach((p,i)=>{
    CATS.forEach(c=>{
      (p.entries[c.id]||[]).forEach(e=>{
        if(parseFloat(e.custo)>0 && e.data){
          const ano=e.data.split('-')[0];
          todosCustos.push({ano,parcela:p.nome,parcelaIdx:i,cat:c.id,catLabel:c.label,catDot:c.dot,catBg:c.bg,catTc:c.tc,custo:parseFloat(e.custo),data:e.data,desc:e.proc||''});
        }
      });
    });
    // colheitas também têm custo
    (p.colheitas||[]).forEach(c=>{
      if(parseFloat(c.custo)>0 && c.data){
        const ano=c.data.split('-')[0];
        todosCustos.push({ano,parcela:p.nome,parcelaIdx:i,cat:'colheita',catLabel:'Colheita',catDot:'#4a7a28',catBg:'#e8f5d8',catTc:'#3a6b10',custo:parseFloat(c.custo),data:c.data,desc:'Colheita'});
      }
    });
  });

  // Anos disponíveis
  const anos=[...new Set(todosCustos.map(x=>x.ano))].sort((a,b)=>b-a);
  if(!relAnoSel || !anos.includes(relAnoSel)) relAnoSel=anos[0]||String(new Date().getFullYear());

  const filtrado=todosCustos.filter(x=>x.ano===relAnoSel);
  const totalAno=filtrado.reduce((s,x)=>s+x.custo,0);

  // Totais por parcela
  const porParcela={};
  state.parcelas.forEach(p=>{porParcela[p.nome]=0;});
  filtrado.forEach(x=>{porParcela[x.parcela]=(porParcela[x.parcela]||0)+x.custo;});
  const maxParcela=Math.max(...Object.values(porParcela),1);

  // Totais por categoria
  const porCat={};
  filtrado.forEach(x=>{
    if(!porCat[x.cat]) porCat[x.cat]={label:x.catLabel,dot:x.catDot,bg:x.catBg,tc:x.catTc,total:0};
    porCat[x.cat].total+=x.custo;
  });
  const catEntries=Object.entries(porCat).sort((a,b)=>b[1].total-a[1].total);
  const maxCat=Math.max(...catEntries.map(([,v])=>v.total),1);

  const yearBtns=anos.length===0
    ?`<span style="font-size:13px;color:var(--text3);">Sem custos registados ainda.</span>`
    :anos.map(a=>`<button class="rel-year-btn ${a===relAnoSel?'active':''}" onclick="setRelAno('${a}')">${a}</button>`).join('');

  // Gráfico por parcela
  const barsParcela=Object.entries(porParcela)
    .filter(([,v])=>v>0)
    .sort((a,b)=>b[1]-a[1])
    .map(([nome,val])=>{
      const pct=Math.max(Math.round((val/maxParcela)*100),3);
      return `<div class="bar-row">
        <div class="bar-label">${nome}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#2a5aa0;"><span class="bar-fill-val">${pct>25?val.toFixed(2)+'€':''}</span></div></div>
        <div class="bar-val-outside">${pct<=25?val.toFixed(2)+'€':''}</div>
      </div>`;
    }).join('');

  // Gráfico por categoria
  const barsCat=catEntries.map(([,c])=>{
    const pct=Math.max(Math.round((c.total/maxCat)*100),3);
    return `<div class="bar-row">
      <div class="bar-label"><span class="rel-cat-dot" style="background:${c.dot}"></span>${c.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.dot};"><span class="bar-fill-val">${pct>25?c.total.toFixed(2)+'€':''}</span></div></div>
      <div class="bar-val-outside">${pct<=25?c.total.toFixed(2)+'€':''}</div>
    </div>`;
  }).join('');

  // Tabela detalhada por parcela e categoria
  const tabelaRows=state.parcelas.map(p=>{
    const custoP=filtrado.filter(x=>x.parcela===p.nome).reduce((s,x)=>s+x.custo,0);
    if(!custoP) return '';
    const porCatP={};
    filtrado.filter(x=>x.parcela===p.nome).forEach(x=>{
      if(!porCatP[x.cat]) porCatP[x.cat]={label:x.catLabel,dot:x.catDot,total:0};
      porCatP[x.cat].total+=x.custo;
    });
    const detalhe=Object.entries(porCatP).sort((a,b)=>b[1].total-a[1].total)
      .map(([,c])=>`<span style="font-size:11px;padding:1px 6px;border-radius:8px;background:var(--bg2);color:var(--text2);margin-right:4px;"><span class="rel-cat-dot" style="background:${c.dot}"></span>${c.label}: ${c.total.toFixed(2)}€</span>`).join('');
    return `<tr>
      <td style="font-weight:500;">${p.nome}</td>
      <td><div style="display:flex;flex-wrap:wrap;gap:3px;">${detalhe}</div></td>
      <td style="font-weight:700;text-align:right;">${custoP.toFixed(2)}€</td>
    </tr>`;
  }).join('');

  const emptyState=`<div style="text-align:center;padding:2rem;font-size:13px;color:var(--text3);">Sem custos registados em ${relAnoSel}.<br>Adiciona custos nos registos das parcelas.</div>`;

  document.getElementById('sec-relatorios').innerHTML=`
    <div class="summary-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1rem;">
      <div class="metric"><div class="metric-label">Ano selecionado</div><div class="metric-value">${relAnoSel}</div><div class="metric-sub">a visualizar</div></div>
      <div class="metric"><div class="metric-label">Total de custos</div><div class="metric-value">${totalAno?totalAno.toFixed(2)+'€':'—'}</div><div class="metric-sub">em ${relAnoSel}</div></div>
      <div class="metric"><div class="metric-label">Categorias</div><div class="metric-value">${catEntries.length||'—'}</div><div class="metric-sub">com custos</div></div>
    </div>

    <div style="margin-bottom:1rem;">
      <span style="font-size:12px;color:var(--text3);margin-right:8px;">Ano:</span>
      ${yearBtns}
    </div>

    ${filtrado.length===0 ? `<div class="card card-pad">${emptyState}</div>` : `
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-header"><span class="card-title">Custos por parcela</span></div>
      <div class="bar-chart">${barsParcela||'<p style="font-size:13px;color:var(--text3);">Sem dados</p>'}</div>
    </div>

    <div class="card" style="margin-bottom:1rem;">
      <div class="card-header"><span class="card-title">Custos por categoria</span></div>
      <div class="bar-chart">${barsCat||'<p style="font-size:13px;color:var(--text3);">Sem dados</p>'}</div>
    </div>

    <div class="card" style="margin-bottom:1rem;">
      <div class="card-header"><span class="card-title">Detalhe por parcela</span></div>
      <table class="rel-table">
        <thead><tr><th>Parcela</th><th>Por categoria</th><th style="text-align:right;">Total</th></tr></thead>
        <tbody>
          ${tabelaRows}
          <tr class="total-row">
            <td>Total geral</td>
            <td></td>
            <td style="text-align:right;">${totalAno.toFixed(2)}€</td>
          </tr>
        </tbody>
      </table>
    </div>`}`;
}

window.setRelAno=function(ano){relAnoSel=ano;renderRelatorios();}

window.openExportModal=function(){
  const cont=document.getElementById('exportParcelasCheck');
  cont.innerHTML=state.parcelas.map((p,i)=>
    `<label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:normal;text-transform:none;letter-spacing:0;cursor:pointer;">
      <input type="checkbox" class="exp-parcela-cb" value="${i}" checked> ${p.nome}${p.porPlantar?' (por plantar)':''}
    </label>`
  ).join('');
  document.getElementById('exportModalBg').classList.add('open');
}
window.closeExportModal=function(){document.getElementById('exportModalBg').classList.remove('open');}

window.gerarPDF=function(){
  const selIdxs=[...document.querySelectorAll('.exp-parcela-cb:checked')].map(cb=>parseInt(cb.value));
  const incInfo=document.getElementById('expInfo').checked;
  const incOps=document.getElementById('expOps').checked;
  const incColheitas=document.getElementById('expColheitas').checked;
  const incCustos=document.getElementById('expCustos').checked;
  const incFotos=document.getElementById('expFotos').checked;

  if(selIdxs.length===0){alert('Seleciona pelo menos uma parcela.');return;}

  const hoje=new Date().toLocaleDateString('pt-PT');
  let html=`<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8">
  <title>Caderno de Oliveiras</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;color:#1a1a18;font-size:13px;line-height:1.5;}
    .page-break{page-break-before:always;}
    h1{font-size:22px;font-weight:700;margin-bottom:4px;}
    h2{font-size:16px;font-weight:700;margin:20px 0 10px;color:#2a5aa0;border-bottom:2px solid #daeaf8;padding-bottom:4px;}
    h3{font-size:13px;font-weight:700;margin:14px 0 6px;color:#1a1a18;}
    .header{padding:20px 24px 14px;border-bottom:2px solid #1a1a18;margin-bottom:20px;}
    .header-sub{font-size:12px;color:#9a9a95;margin-top:2px;}
    .section{padding:0 24px;margin-bottom:16px;}
    .info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
    .info-item{background:#f5f4f0;border-radius:6px;padding:8px 10px;}
    .info-label{font-size:10px;color:#9a9a95;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
    .info-val{font-size:13px;font-weight:600;}
    table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px;}
    th{background:#f5f4f0;text-align:left;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:#5a5a55;border-bottom:1px solid #e0ddd5;}
    td{padding:7px 10px;border-bottom:1px solid #eeecea;vertical-align:top;}
    tr:last-child td{border-bottom:none;}
    .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;}
    .cat-pill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-right:3px;}
    .total-row{font-weight:700;background:#f5f4f0;}
    .foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
    .foto-item img{width:100%;height:100px;object-fit:cover;border-radius:4px;}
    .foto-item p{font-size:10px;color:#9a9a95;margin-top:3px;}
    .resumo-custos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
    .resumo-item{background:#f5f4f0;border-radius:6px;padding:8px 10px;}
    .page-footer{text-align:center;font-size:10px;color:#9a9a95;padding:10px 24px;border-top:1px solid #e0ddd5;margin-top:20px;}
  </style></head><body>
  <div class="header">
    <h1>🫒 Caderno de Campo — Oliveiras</h1>
    <div class="header-sub">Gerado em ${hoje} · ${selIdxs.length} parcela${selIdxs.length!==1?'s':''}</div>
  </div>`;

  selIdxs.forEach((idx,pi)=>{
    const p=state.parcelas[idx];
    if(pi>0) html+=`<div class="page-break"></div>`;

    html+=`<div class="section"><h2>${p.nome}${p.porPlantar?' — Por plantar':''}</h2>`;

    // Info geral
    if(incInfo){
      html+=`<div class="info-grid">
        <div class="info-item"><div class="info-label">Área</div><div class="info-val">${p.area?p.area+' ha':'—'}</div></div>
        <div class="info-item"><div class="info-label">Nº de árvores</div><div class="info-val">${p.arvores||'—'}</div></div>
        <div class="info-item"><div class="info-label">Variedade</div><div class="info-val">${p.variedade||'—'}</div></div>
        <div class="info-item"><div class="info-label">Data de plantação</div><div class="info-val">${formatDate(p.plantacao)||'—'}</div></div>
        ${p.notas?`<div class="info-item" style="grid-column:1/-1"><div class="info-label">Notas</div><div class="info-val" style="font-weight:normal;">${p.notas}</div></div>`:''}
      </div>`;
    }

    // Operações
    if(incOps){
      let todasOps=[];
      CATS.forEach(c=>{(p.entries[c.id]||[]).forEach(e=>{todasOps.push({...e,catLabel:c.label,catDot:c.dot,catBg:c.bg,catTc:c.tc});});});
      todasOps.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
      if(todasOps.length>0){
        html+=`<h3>Registos de operações</h3><table>
          <thead><tr><th>Data</th><th>Categoria</th><th>Descrição</th><th>Custo</th></tr></thead><tbody>`;
        todasOps.forEach(e=>{
          html+=`<tr>
            <td style="white-space:nowrap;">${formatDate(e.data)||'—'}</td>
            <td><span class="cat-pill" style="background:${e.catBg};color:${e.catTc};">${e.catLabel}</span></td>
            <td>${e.proc||'—'}${e.cat==='fito'&&e.marca?`<br><span style="font-size:10px;color:#9a9a95;">Marca: ${e.marca}${e.qtd?' · Dose: '+e.qtd:''}${e.alvo?' · Alvo: '+e.alvo:''}</span>`:''}${e.notas?`<br><span style="font-size:10px;color:#9a9a95;">${e.notas}</span>`:''}</td>
            <td style="white-space:nowrap;">${e.custo?parseFloat(e.custo).toFixed(2)+'€':'—'}</td>
          </tr>`;
        });
        html+=`</tbody></table>`;
      }
    }

    // Colheitas
    if(incColheitas){
      const cols=p.colheitas||[];
      if(cols.length>0){
        const totKg=cols.reduce((s,c)=>s+(parseFloat(c.kg)||0),0);
        const totL=cols.reduce((s,c)=>s+(parseFloat(c.litros)||0),0);
        html+=`<h3>Colheitas</h3><table>
          <thead><tr><th>Data</th><th>Azeitona (kg)</th><th>Azeite (L)</th><th>Rendimento</th><th>Lagar</th><th>Custo</th></tr></thead><tbody>`;
        [...cols].sort((a,b)=>(b.data||'').localeCompare(a.data||'')).forEach(c=>{
          const r=(c.kg&&c.litros)?(parseFloat(c.kg)/parseFloat(c.litros)).toFixed(2):null;
          html+=`<tr>
            <td>${formatDate(c.data)||'—'}</td>
            <td>${c.kg?parseFloat(c.kg).toFixed(0)+' kg':'—'}</td>
            <td>${c.litros?parseFloat(c.litros).toFixed(1)+' L':'—'}</td>
            <td>${r?r+' kg/L':'—'}</td>
            <td>${c.lagar||'—'}</td>
            <td>${c.custo?parseFloat(c.custo).toFixed(2)+'€':'—'}</td>
          </tr>`;
        });
        html+=`<tr class="total-row"><td>Total</td><td>${totKg.toFixed(0)} kg</td><td>${totL.toFixed(1)} L</td><td>${totKg&&totL?(totKg/totL).toFixed(2)+' kg/L':'—'}</td><td></td><td>${cols.reduce((s,c)=>s+(parseFloat(c.custo)||0),0).toFixed(2)}€</td></tr>`;
        html+=`</tbody></table>`;
      }
    }

    // Custos
    if(incCustos){
      let totalCusto=0;
      const porCat={};
      CATS.forEach(c=>{
        const t=(p.entries[c.id]||[]).reduce((s,e)=>s+(parseFloat(e.custo)||0),0);
        if(t>0){porCat[c.label]={total:t,bg:c.bg,tc:c.tc};totalCusto+=t;}
      });
      const tCol=(p.colheitas||[]).reduce((s,c)=>s+(parseFloat(c.custo)||0),0);
      if(tCol>0){porCat['Colheita']={total:tCol,bg:'#e8f5d8',tc:'#3a6b10'};totalCusto+=tCol;}
      if(totalCusto>0){
        html+=`<h3>Resumo de custos</h3><div class="resumo-custos">`;
        Object.entries(porCat).forEach(([label,v])=>{
          html+=`<div class="resumo-item"><div class="info-label">${label}</div><div class="info-val">${v.total.toFixed(2)}€</div></div>`;
        });
        html+=`<div class="resumo-item" style="background:#1a1a18;color:#fff;"><div class="info-label" style="color:#ccc;">Total geral</div><div class="info-val" style="color:#fff;">${totalCusto.toFixed(2)}€</div></div>`;
        html+=`</div>`;
      }
    }

    // Fotos
    if(incFotos){
      const fotos=p.fotos||[];
      if(fotos.length>0){
        html+=`<h3>Fotografias</h3><div class="foto-grid">`;
        fotos.forEach(f=>{
          html+=`<div class="foto-item"><img src="${f.data}"><p>${formatDate(f.data_reg)||''}${f.nota?' — '+f.nota:''}</p></div>`;
        });
        html+=`</div>`;
      }
    }

    html+=`</div>`;
  });

  html+=`<div class="page-footer">Caderno de Campo — Oliveiras · Exportado em ${hoje}</div></body></html>`;

  // Abrir janela de impressão
  const win=window.open('','_blank');
  win.document.write(html);
  win.document.close();
  win.onload=function(){win.print();};
  closeExportModal();
}

// ── MAPA ─────────────────────────────────────────────────────
const CORES_MAPA=['#2a5aa0','#d94040','#5a9020','#b07010','#1a9870','#c05030','#7040b0','#808078'];
let mapaInstance=null, mapaMarkers=[], mapaModoPicker=false, mapaPickerIdx=null;

function renderMapa(){
  const comCoords=state.parcelas.filter(p=>p.lat&&p.lng);

  // Lista de parcelas
  const listaHtml=state.parcelas.map((p,i)=>{
    const cor=CORES_MAPA[i%CORES_MAPA.length];
    const temCoords=p.lat&&p.lng;
    return `<div class="mapa-parcela-row">
      <div class="mapa-parcela-cor" style="background:${cor}"></div>
      <div class="mapa-parcela-nome">${p.nome}</div>
      <div class="mapa-parcela-coords">${temCoords?`${parseFloat(p.lat).toFixed(5)}, ${parseFloat(p.lng).toFixed(5)}`:'Sem localização'}</div>
      <button class="mapa-btn" onclick="iniciarPicker(${i})">${temCoords?'Mover':'📍 Marcar'}</button>
      ${temCoords?`<button class="mapa-btn danger" onclick="removerCoords(${i})">×</button>`:''}
    </div>`;
  }).join('');

  document.getElementById('sec-mapa').innerHTML=`
    <div class="card card-pad" style="margin-bottom:1rem;">
      <div style="font-size:14px;font-weight:600;margin-bottom:10px;">🗺 Mapa das parcelas</div>
      <div class="mapa-parcela-list">${listaHtml}</div>
      <p class="mapa-instrucao" id="mapaInstrucao" style="display:none;">Clica no mapa para marcar a localização da parcela selecionada. Clica em "Cancelar" para desistir.</p>
      <button class="mapa-btn" id="mapaCancelarBtn" style="display:none;margin-bottom:8px;" onclick="cancelarPicker()">Cancelar marcação</button>
    </div>
    <div class="mapa-wrap"><div id="mapaLeaflet"></div></div>`;

  // Inicializar mapa
  setTimeout(()=>{
    if(mapaInstance){mapaInstance.remove();mapaInstance=null;}
    // Centro por defeito — Ouronó, Portugal
    const centro=comCoords.length>0
      ?[parseFloat(comCoords[0].lat),parseFloat(comCoords[0].lng)]
      :[38.9215, -8.1732];
    const zoom=comCoords.length>0?14:13;

    mapaInstance=L.map('mapaLeaflet').setView(centro,zoom);

    const satelite=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
      attribution:'© Esri, Maxar, Earthstar Geographics',maxZoom:19
    });
    const normal=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap',maxZoom:19
    });

    satelite.addTo(mapaInstance);
    L.control.layers({'🛰 Satélite':satelite,'🗺 Mapa':normal},{},{position:'topright'}).addTo(mapaInstance);

    // Adicionar marcadores
    mapaMarkers=[];
    state.parcelas.forEach((p,i)=>{
      if(p.lat&&p.lng){
        const cor=CORES_MAPA[i%CORES_MAPA.length];
        const icon=L.divIcon({
          className:'',
          html:`<div style="background:${cor};width:28px;height:28px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;">${i+1}</div>`,
          iconSize:[28,28],iconAnchor:[14,14]
        });
        const marker=L.marker([parseFloat(p.lat),parseFloat(p.lng)],{icon})
          .addTo(mapaInstance)
          .bindPopup(`<b>${p.nome}</b>${p.variedade?'<br>'+p.variedade:''}${p.arvores?'<br>'+p.arvores+' árvores':''}${p.area?'<br>'+p.area+' ha':''}`);
        mapaMarkers.push(marker);
      }
    });

    // Ajustar vista a todos os marcadores
    if(comCoords.length>1){
      const bounds=L.latLngBounds(comCoords.map(p=>[parseFloat(p.lat),parseFloat(p.lng)]));
      mapaInstance.fitBounds(bounds,{padding:[30,30]});
    }

    // Click no mapa para marcar parcela
    mapaInstance.on('click',function(e){
      if(!mapaModoPicker||mapaPickerIdx===null)return;
      const {lat,lng}=e.latlng;
      state.parcelas[mapaPickerIdx].lat=lat.toFixed(6);
      state.parcelas[mapaPickerIdx].lng=lng.toFixed(6);
      save();
      cancelarPicker();
      renderMapa();
    });
  },100);
}

window.iniciarPicker=function(idx){
  mapaModoPicker=true; mapaPickerIdx=idx;
  document.getElementById('mapaInstrucao').style.display='block';
  document.getElementById('mapaCancelarBtn').style.display='inline-block';
  document.getElementById('mapaInstrucao').textContent=`Clica no mapa para marcar "${state.parcelas[idx].nome}". Podes fazer zoom primeiro para maior precisão.`;
  if(mapaInstance) mapaInstance.getContainer().style.cursor='crosshair';
}

window.cancelarPicker=function(){
  mapaModoPicker=false; mapaPickerIdx=null;
  const instr=document.getElementById('mapaInstrucao');
  const btn=document.getElementById('mapaCancelarBtn');
  if(instr)instr.style.display='none';
  if(btn)btn.style.display='none';
  if(mapaInstance) mapaInstance.getContainer().style.cursor='';
}

window.removerCoords=function(idx){
  if(!confirm('Remover a localização desta parcela?'))return;
  delete state.parcelas[idx].lat;
  delete state.parcelas[idx].lng;
  save(); renderMapa();
}

function mostrarAlertas(){
  const mesAtual=new Date().getMonth()+1;
  const mesNome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][mesAtual-1];
  const entrada=ALERTAS_CAL.find(a=>a.mes===mesAtual);
  if(!entrada)return;

  // Verificar se já foi fechado hoje
  const chave='alertas_fechado_'+new Date().toISOString().split('T')[0];
  if(localStorage.getItem(chave))return;

  const lista=document.getElementById('alertasLista');
  const banner=document.getElementById('alertasBanner');
  lista.innerHTML=entrada.tarefas.map(t=>
    `<div class="alerta-item">
      <span class="alerta-icon">${t.icon}</span>
      <span class="alerta-text">${t.texto}<span class="alerta-cat" style="background:${t.bg};color:${t.tc};">${t.cat}</span></span>
    </div>`
  ).join('');
  banner.classList.add('show');
}

window.fecharAlertas=function(){
  document.getElementById('alertasBanner').classList.remove('show');
  const chave='alertas_fechado_'+new Date().toISOString().split('T')[0];
  localStorage.setItem(chave,'1');
}
